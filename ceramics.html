<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>emt's clay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="tomato.png" />
</head>
<body>

<main class="ceramics-page">
  <a class="nav-home" href="index.html" title="Home"></a>

  <h2>Ceramics</h2>

  <div class="gallery-grid">
    <div class="gallery-item">
      <img src="bowls.jpg" alt="some bowls, teapot"/>
      <div class="gallery-overlay">
        <span class="piece-name">bowls</span>
        <span class="piece-date">06.2026</span>
      </div>
    </div>
    <div class="gallery-item">
      <img src="smiski.jpg" alt="smiski"/>
      <div class="gallery-overlay">
        <span class="piece-name">little smiski dude</span>
        <span class="piece-date">06.2026</span>
      </div>
    </div>
    <div class="gallery-item">
      <img src="teapot.jpg" alt="cat teapot and gingko teapot"/>
      <div class="gallery-overlay">
        <span class="piece-name">teapots</span>
        <span class="piece-date">11.2025</span>
      </div>
    </div>
    <div class="gallery-item">
      <img src="jars.jpg" alt="small jars with my pets on them!"/>
      <div class="gallery-overlay">
        <span class="piece-name">pet jars</span>
        <span class="piece-date">11.2025</span>
      </div>
    </div>
    <div class="gallery-item">
      <img src="man.jpg" alt="ancient dude on a horse"/>
      <div class="gallery-overlay">
        <span class="piece-name">funny guy i saw a museum</span>
        <span class="piece-date">10.2025</span>
      </div>
    </div>
  </div>
</main>

</body>
</html>
